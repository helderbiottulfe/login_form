<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Helder Biottulfe 77750 - Student Login Form</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <section class="card">
      <div class="header">
        <p class="eyebrow">Helder's college</p>
        <h1>Login Form</h1>
        <p class="subtitle">Enter your student details to continue.</p>
      </div>

      <form id="studentForm" class="student-form" novalidate>
        <div class="field-group">
          <label for="firstName">First Name</label>
          <input type="text" id="firstName" name="firstName" placeholder="Enter your first name" />
          <p class="error-message" id="firstNameError" aria-live="polite"></p>
        </div>

        <div class="field-group">
          <label for="lastName">Last Name</label>
          <input type="text" id="lastName" name="lastName" placeholder="Enter your last name" />
          <p class="error-message" id="lastNameError" aria-live="polite"></p>
        </div>

        <div class="field-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="student@example.com" />
          <p class="error-message" id="emailError" aria-live="polite"></p>
        </div>

        <div class="field-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" />
          <p class="error-message" id="passwordError" aria-live="polite"></p>
        </div>

        <div class="field-group">
          <label for="studentId">Student ID</label>
          <input type="text" id="studentId" name="studentId" placeholder="Enter your student ID" />
          <p class="error-message" id="studentIdError" aria-live="polite"></p>
        </div>

        <button type="submit" class="submit-btn">Submit</button>
      </form>

      <section id="successMessage" class="success-message" hidden>
        <div class="success-icon">✓</div>
        <h2>Success</h2>
        <p>Your student login form was submitted successfully.</p>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
